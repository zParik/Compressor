<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SquishIt — Squish Videos for Discord</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Gabarito:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}

:root {
  --bg: oklch(7% 0.003 110);
  --bg-deep: oklch(4% 0.002 110);
  --surface: oklch(12% 0.005 110);
  --surface-2: oklch(17% 0.006 110);
  --surface-3: oklch(22% 0.008 110);
  --border: oklch(27% 0.009 110);
  --border-hi: oklch(38% 0.012 110);
  --text: oklch(96% 0.008 110);
  --text-dim: oklch(58% 0.012 110);
  --text-faint: oklch(38% 0.008 110);
  --lime: oklch(76% 0.17 128);
  --lime-light: oklch(84% 0.13 128);
  --lime-glow: oklch(76% 0.17 128 / 0.2);
  --lime-dim: oklch(76% 0.17 128 / 0.1);
  --green: oklch(74% 0.18 148);
  --green-dim: oklch(74% 0.18 148 / 0.12);
  --yellow: oklch(84% 0.17 92);
  --yellow-dim: oklch(84% 0.17 92 / 0.12);
  --red: oklch(62% 0.22 22);
  --red-dim: oklch(62% 0.22 22 / 0.12);
  --r: 16px;
  --r-sm: 10px;
}

body {
  font-family: 'Gabarito', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  font-kerning: normal;
}

/* Background art */
.bg-art {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  overflow: hidden;
}
.bg-art .orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(100px);
  animation: float 18s ease-in-out infinite;
}
.bg-art .orb:nth-child(1) {
  width: 500px; height: 500px;
  top: -180px; right: -120px;
  background: radial-gradient(circle, oklch(88% 0.3 128 / 0.1), transparent 70%);
}
.bg-art .orb:nth-child(2) {
  width: 400px; height: 400px;
  bottom: -100px; left: -80px;
  background: radial-gradient(circle, oklch(88% 0.3 128 / 0.06), transparent 70%);
  animation-delay: -8s;
}
.bg-art .orb:nth-child(3) {
  width: 300px; height: 300px;
  top: 40%; left: 50%;
  background: radial-gradient(circle, oklch(88% 0.3 128 / 0.04), transparent 70%);
  animation-delay: -14s;
}
@keyframes float {
  0%,100% { transform: translate(0,0) scale(1); }
  33% { transform: translate(40px,-30px) scale(1.1); }
  66% { transform: translate(-20px,50px) scale(0.95); }
}

/* Subtle film grain overlay */
body::after {
  content:'';position:fixed;inset:0;z-index:1;pointer-events:none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  background-size: 256px;
}

.wrap { position:relative; z-index:2; max-width:700px; margin:0 auto; padding:0 20px; }

/* Header */
header {
  padding: 28px 0 8px;
  display: flex;
  align-items: center;
  gap: 14px;
}
.logo {
  display: flex; align-items: center; gap: 10px; text-decoration: none;
}
.logo-box {
  width: 42px; height: 42px;
  background: var(--lime);
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 10px var(--lime-glow);
  flex-shrink: 0;
}
.logo-box svg { width: 22px; height: 22px; color: var(--bg); }
.logo-name {
  font-size: 1.375rem;
  font-weight: 800;
  letter-spacing: -0.03em;
}
.logo-name span { color: var(--lime); }
header .chip {
  margin-left: auto;
  font-size: 0.6875rem; font-weight: 600;
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 6px 14px;
  border-radius: 100px;
  color: var(--text-dim);
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

/* Hero */
.hero {
  text-align: center;
  padding: 44px 0 36px;
}
.hero h1 {
  font-size: clamp(2rem, 5.5vw, 3.125rem);
  font-weight: 900;
  line-height: 1.08;
  letter-spacing: -0.04em;
  margin-bottom: 12px;
}
.hero h1 .highlight {
  color: var(--lime);
}
.hero p {
  color: var(--text-dim);
  font-size: 1rem;
  line-height: 1.6;
  max-width: 460px;
  margin: 0 auto;
}

/* Size presets */
.presets {
  display: flex;
  gap: 8px;
  justify-content: center;
  margin-bottom: 24px;
  flex-wrap: wrap;
}
.preset {
  padding: 10px 18px;
  border-radius: 100px;
  border: 2px solid var(--border);
  background: var(--surface);
  color: var(--text-dim);
  font-family: inherit;
  font-size: 0.8125rem;
  font-weight: 600;
  cursor: pointer;
  transition: border-color 0.2s, color 0.2s, background-color 0.2s, box-shadow 0.2s, transform 0.1s;
  display: flex; align-items: center; gap: 7px;
}
.preset:hover { border-color: var(--border-hi); color: var(--text); }
.preset:active { transform: scale(0.96); }
.preset.active {
  border-color: var(--lime);
  background: var(--lime-dim);
  color: var(--lime-light);
  box-shadow: 0 0 20px var(--lime-glow);
}
.preset .tier {
  font-size: 0.6875rem;
  background: var(--surface-3);
  padding: 2px 7px;
  border-radius: 4px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  transition: background-color 0.2s;
}
.preset.active .tier {
  background: oklch(76% 0.17 128 / 0.2);
}

/* Quality selector */
.quality-row {
  display: flex;
  gap: 6px;
  justify-content: center;
  margin-bottom: 28px;
}
.q-btn {
  padding: 8px 16px;
  border-radius: 100px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-dim);
  font-family: inherit;
  font-size: 0.75rem;
  font-weight: 600;
  cursor: pointer;
  transition: border-color 0.2s, color 0.2s, background-color 0.2s, transform 0.1s;
}
.q-btn:hover { border-color: var(--border-hi); color: var(--text); }
.q-btn:active { transform: scale(0.95); }
.q-btn.active {
  border-color: var(--lime);
  background: var(--lime-dim);
  color: var(--lime);
}

/* Drop zone */
.dropzone {
  border: 2px dashed var(--border);
  border-radius: var(--r);
  padding: 48px 24px;
  text-align: center;
  cursor: pointer;
  transition: border-color 0.25s, background-color 0.25s;
  background: var(--surface);
  position: relative;
  overflow: hidden;
}
.dropzone::before {
  content:''; position:absolute; inset:0;
  background: radial-gradient(ellipse at center, var(--lime-glow), transparent 70%);
  opacity: 0; transition: opacity 0.3s;
}
.dropzone:hover, .dropzone.drag-over {
  border-color: var(--lime);
  background: var(--surface-2);
}
.dropzone:hover::before, .dropzone.drag-over::before { opacity: 1; }

.dz-arrow {
  width: 32px; height: 32px;
  stroke: var(--text-faint);
  display: block;
  margin: 0 auto 14px;
  position: relative; z-index: 1;
  transition: stroke 0.25s;
}
.dropzone:hover .dz-arrow { stroke: var(--lime-light); }
.dropzone.drag-over .dz-arrow {
  stroke: var(--lime-light);
  animation: dzNudge 0.6s cubic-bezier(0.22, 1, 0.36, 1) infinite alternate;
}
@keyframes dzNudge {
  from { transform: translateY(0); }
  to { transform: translateY(5px); }
}
.dropzone h3 {
  font-size: 1rem; font-weight: 700;
  margin-bottom: 5px;
  position: relative; z-index: 1;
}
.dropzone h3 span { color: var(--lime-light); }
.dropzone p { color: var(--text-faint); font-size: 0.8125rem; position: relative; z-index: 1; }
#file-input { display: none; }

/* Job card */
.job-area { margin-top: 20px; }

.job-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 24px;
  animation: popIn 0.4s cubic-bezier(0.22, 1, 0.36, 1);
}
@keyframes popIn {
  from { opacity:0; transform: translateY(16px) scale(0.97); }
  to { opacity:1; transform: translateY(0) scale(1); }
}

.job-header {
  display: flex; align-items: center; gap: 14px;
  margin-bottom: 20px;
}
.job-thumb {
  width: 56px; height: 56px;
  border-radius: 12px;
  background: var(--surface-3);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  overflow: hidden;
}
.job-thumb video { width: 100%; height: 100%; object-fit: cover; border-radius: 12px; }
.job-info { flex: 1; min-width: 0; }
.job-info h4 {
  font-size: 0.875rem; font-weight: 700;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  margin-bottom: 3px;
}
.job-info p { font-size: 0.75rem; color: var(--text-dim); }
.job-info p span { font-family: 'JetBrains Mono', monospace; font-variant-numeric: tabular-nums; }

.job-status {
  font-size: 0.75rem; font-weight: 700;
  padding: 5px 12px;
  border-radius: 100px;
  letter-spacing: 0.02em;
  white-space: nowrap;
  transition: background-color 0.25s, color 0.25s;
}
.job-status.analyzing { background: var(--yellow-dim); color: var(--yellow); }
.job-status.compressing { background: var(--lime-dim); color: var(--lime-light); animation: pulse 1.5s infinite; }
.job-status.done { background: var(--green-dim); color: var(--green); animation: chipPop 0.4s cubic-bezier(0.22, 1, 0.36, 1); }
.job-status.error { background: var(--red-dim); color: var(--red); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }
@keyframes chipPop {
  0% { transform: scale(0.8); opacity: 0; }
  60% { transform: scale(1.08); }
  100% { transform: scale(1); opacity: 1; }
}

/* Progress bar */
.progress-track {
  height: 6px;
  background: var(--surface-3);
  border-radius: 3px;
  overflow: hidden;
  margin-bottom: 12px;
}
.progress-fill {
  height: 100%;
  border-radius: 3px;
  background: var(--lime);
  transition: width 0.5s cubic-bezier(0.25, 1, 0.5, 1);
  position: relative;
}
.progress-fill::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
  animation: shimmer 1.5s infinite;
}
@keyframes shimmer {
  from { transform: translateX(-100%); }
  to { transform: translateX(100%); }
}

.progress-meta {
  display: flex;
  justify-content: space-between;
  font-size: 0.75rem;
  color: var(--text-dim);
  margin-bottom: 16px;
}
.progress-meta span { font-family: 'JetBrains Mono', monospace; font-size: 0.6875rem; font-variant-numeric: tabular-nums; }

/* Result stats */
.result-stats {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  gap: 16px;
  align-items: center;
  margin-bottom: 20px;
}
.stat-box {
  text-align: center;
  padding: 16px;
  border-radius: var(--r-sm);
  background: var(--surface-2);
}
.stat-box .label { font-size: 0.6875rem; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; font-weight: 600; }
.stat-box .value { font-family: 'JetBrains Mono', monospace; font-size: 1.375rem; font-weight: 700; font-variant-numeric: tabular-nums; }
.stat-unit { font-size: 0.8125rem; opacity: 0.7; }
.stat-box.before .value { color: var(--text-dim); }
.stat-box.after .value { color: var(--green); }
.stat-arrow {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
}
.stat-arrow svg { width: 24px; height: 24px; stroke: var(--text-faint); }
.stat-arrow .pct {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.8125rem; font-weight: 700;
  font-variant-numeric: tabular-nums;
  color: var(--green);
  background: var(--green-dim);
  padding: 3px 10px;
  border-radius: 6px;
}

.btn-download {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  width: 100%;
  padding: 16px;
  border-radius: var(--r-sm);
  border: none;
  background: var(--lime);
  color: var(--bg);
  font-family: inherit;
  font-size: 0.9375rem;
  font-weight: 700;
  cursor: pointer;
  transition: transform 0.2s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.2s, background-color 0.2s;
  box-shadow: 0 4px 24px var(--lime-glow);
  text-decoration: none;
}
.btn-download:hover { transform: translateY(-2px); box-shadow: 0 8px 32px var(--lime-glow); background: var(--lime-light); }
.btn-download:active { transform: translateY(0) scale(0.99); box-shadow: 0 2px 12px var(--lime-glow); }
.btn-download svg { width: 20px; height: 20px; }

.btn-another {
  display: block;
  margin: 14px auto 0;
  padding: 10px 24px;
  border-radius: 100px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-dim);
  font-family: inherit;
  font-size: 0.8125rem;
  font-weight: 600;
  cursor: pointer;
  transition: border-color 0.2s, color 0.2s, transform 0.1s;
}
.btn-another:hover { border-color: var(--text-dim); color: var(--text); }
.btn-another:active { transform: scale(0.97); }

/* Footer */
footer {
  text-align: center; padding: 48px 0 32px;
  color: var(--text-faint); font-size: 0.75rem;
  line-height: 1.7;
}

.result-params { font-size: 0.6875rem; color: var(--text-faint); }
.result-note { color: var(--yellow); font-size: 0.75rem; text-align: center; margin-bottom: 12px; }

/* Keyboard focus — only show on keyboard nav, not click */
.preset:focus-visible,
.q-btn:focus-visible,
.btn-download:focus-visible,
.btn-another:focus-visible {
  outline: 2px solid var(--lime-light);
  outline-offset: 3px;
}
.dropzone:focus-visible { outline: 2px solid var(--lime-light); outline-offset: 2px; }

/* Responsive — on small screens stack the stat boxes vertically */
@media (max-width: 520px) {
  .result-stats { grid-template-columns: 1fr; gap: 8px; }
  .stat-arrow { transform: rotate(90deg); }
  .presets { gap: 6px; }
  .preset { padding: 8px 12px; font-size: 12px; }
  .q-btn { min-height: 44px; padding: 10px 14px; }
}

/* Stop the shimmer once encoding is done */
.progress-fill.complete::after { animation: none; opacity: 0; }

/* Respect reduced motion preference */
@media (prefers-reduced-motion: reduce) {
  .bg-art .orb { animation: none; }
  .progress-fill::after { animation: none; }
  .job-card { animation: none; }
  .job-status.done { animation: none; }
  .dropzone.drag-over .dz-arrow { animation: none; }
  * { transition-duration: 0.01ms !important; }
}
</style>
</head>
<body>

<div class="bg-art">
  <div class="orb"></div>
  <div class="orb"></div>
  <div class="orb"></div>
</div>

<div class="wrap">

<header>
  <a class="logo" href="#">
    <div class="logo-box">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <path d="M21 3L3 21M12 3v7h7"/>
      </svg>
    </div>
    <div class="logo-name">Squish<span>It</span></div>
  </a>
  <div class="chip">100% Free</div>
</header>

<section class="hero">
  <h1>Squish your vids<br>for <span class="highlight">Discord</span></h1>
  <p>Pick your limit, drop your clip, and get a file that actually fits. No guessing, no fiddling.</p>
</section>

<!-- Discord upload tier presets — the data-mb value is sent to the server as the target ceiling -->
<div class="presets" id="presets">
  <button class="preset active" data-mb="10">
    10 MB <span class="tier">Free</span>
  </button>
  <button class="preset" data-mb="25">
    25 MB <span class="tier">Classic</span>
  </button>
  <button class="preset" data-mb="50">
    50 MB <span class="tier">Basic</span>
  </button>
  <button class="preset" data-mb="100">
    100 MB <span class="tier">Custom</span>
  </button>
  <button class="preset" data-mb="500">
    500 MB <span class="tier">Nitro</span>
  </button>
</div>

<!-- Quality modes — tooltips explain the tradeoff so users can make an informed choice -->
<div class="quality-row" id="quality-row">
  <button class="q-btn" data-q="quality" title="Best-looking video. File may be larger — use when quality matters most.">Best Quality</button>
  <button class="q-btn active" data-q="balanced" title="Good quality with a smaller file. The right choice for most clips.">Balanced</button>
  <button class="q-btn" data-q="aggressive" title="Noticeably smaller file, some visual quality loss. Good for longer clips.">Aggressive</button>
  <button class="q-btn" data-q="extreme" title="Smallest possible file. Quality will be reduced — use only when the size limit is really tight.">Extreme (Tiny)</button>
</div>

<div class="dropzone" id="dropzone">
  <svg class="dz-arrow" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
    <polyline points="17 8 12 3 7 8"/>
    <line x1="12" y1="3" x2="12" y2="15"/>
  </svg>
  <h3>Drop a video, or <span>browse</span></h3>
  <p>MP4, MOV, AVI, MKV, WebM, and more</p>
</div>
<!-- Hidden file input — triggered by clicking the dropzone -->
<input type="file" id="file-input" accept="video/*,.mp4,.mov,.avi,.mkv,.webm,.flv,.wmv,.m4v,.3gp,.ts,.mts">

<!-- Job cards get injected here by JS as uploads come in -->
<div class="job-area" id="job-area"></div>

<footer>
  Files auto-delete after 1 hour. No tracking, no accounts.
</footer>

</div>

<script>
// Raw server/ffmpeg errors are noisy and scary for users. This maps known
// patterns to plain language, and falls back to a generic message for anything
// that looks like an internal stack trace.
function friendlyError(msg) {
  if (!msg) return 'Something went wrong. Please try again.';
  const m = msg.toLowerCase();
  if (m.includes('ffprobe') || m.includes('codec') || m.includes('stream') || m.includes('not a valid video'))
    return 'This file doesn\'t look like a valid video. Try a different file — MP4, MOV, and MKV work best.';
  if (m.includes('pass 1 failed') || m.includes('pass 2 failed') || m.includes('output file not created'))
    return 'Compression failed. The video may be corrupted or in an unsupported format.';
  if (m.includes('network') || m.includes('upload failed'))
    return 'Upload failed. Check your connection and try again.';
  if (m.includes('duration') || m.includes('cannot determine'))
    return 'Couldn\'t read the video duration. Try a different file.';
  // Short messages that don't look like tracebacks are probably safe to show verbatim
  if (msg.length < 80 && !m.includes('traceback') && !m.includes('exception') && !m.includes('error:'))
    return msg;
  return 'Something went wrong. Try again with a different file.';
}

// Escape user-provided strings before inserting into innerHTML to prevent XSS
function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// Global job state — only one compression job can be active at a time
let targetMB = 10;
let quality = 'balanced';
let currentJob = null;
let activePoll = null;
let activeXHR = null;

// Preset and quality buttons are purely cosmetic — they just update the state
// variables that get sent with the next upload
document.querySelectorAll('.preset').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.preset').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    targetMB = parseInt(btn.dataset.mb);
  });
});

document.querySelectorAll('.q-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.q-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    quality = btn.dataset.q;
  });
});

// Wire up the dropzone — both drag-and-drop and click-to-browse go through the same uploadFile path
const dz = document.getElementById('dropzone');
const fi = document.getElementById('file-input');

dz.addEventListener('click', () => fi.click());
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
dz.addEventListener('drop', e => {
  e.preventDefault(); dz.classList.remove('drag-over');
  if (e.dataTransfer.files.length) uploadFile(e.dataTransfer.files[0]);
});
fi.addEventListener('change', () => {
  if (fi.files.length) uploadFile(fi.files[0]);
  fi.value = ''; // Reset so the same file can be re-selected if needed
});

function fmtSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes/1024).toFixed(1) + ' KB';
  if (bytes < 1073741824) return (bytes/1048576).toFixed(1) + ' MB';
  return (bytes/1073741824).toFixed(2) + ' GB';
}

// Build the initial job card HTML — shown immediately on upload start
function thumbHtml(thumbURL) {
  return thumbURL ? `<video src="${thumbURL}" muted playsinline></video>` : '';
}

function buildJobCard(file, thumbURL, statusClass, statusText, progress, label) {
  const completeClass = progress >= 100 ? ' complete' : '';
  return `
    <div class="job-card">
      <div class="job-header">
        <div class="job-thumb">${thumbHtml(thumbURL)}</div>
        <div class="job-info">
          <h4>${escHtml(file.name)}</h4>
          <p><span>${fmtSize(file.size)}</span> &rarr; target <span>${targetMB} MB</span></p>
        </div>
        <div class="job-status ${statusClass}" id="job-status-chip">${statusText}</div>
      </div>
      <div class="progress-track">
        <div class="progress-fill${completeClass}" id="progress-fill" style="width:${progress}%"></div>
      </div>
      <div class="progress-meta">
        <span id="progress-label">${label}</span>
        <span id="progress-pct">${progress}%</span>
      </div>
    </div>`;
}

// Patch only the dynamic parts of an existing card — avoids re-triggering
// the popIn animation on every poll tick
function updateCardInPlace(statusClass, statusText, progress, label) {
  const chip = document.getElementById('job-status-chip');
  const fill = document.getElementById('progress-fill');
  const labelEl = document.getElementById('progress-label');
  const pctEl = document.getElementById('progress-pct');
  if (!chip || !fill) return;
  chip.className = `job-status ${statusClass}`;
  chip.textContent = statusText;
  fill.style.width = progress + '%';
  if (progress >= 100) fill.classList.add('complete');
  if (labelEl) labelEl.textContent = label;
  if (pctEl) pctEl.textContent = progress + '%';
}

async function uploadFile(file) {
  // Cancel any in-flight job so we don't end up polling two jobs at once
  if (activeXHR) { activeXHR.abort(); activeXHR = null; }
  if (activePoll) { clearInterval(activePoll); activePoll = null; }

  // Warn before uploading very large files — the server will accept them, but
  // it can take a while and the user should know what they're getting into
  if (file.size > 2 * 1024 * 1024 * 1024) {
    if (!confirm(`This file is ${fmtSize(file.size)} — it may take a while to upload and compress. Continue?`)) return;
  }

  const area = document.getElementById('job-area');
  const thumbURL = URL.createObjectURL(file);
  area.innerHTML = buildJobCard(file, thumbURL, 'analyzing', 'Uploading...', 0, 'Uploading file...');

  const form = new FormData();
  form.append('file', file);
  form.append('target_mb', targetMB);
  form.append('quality', quality);

  try {
    // Use XHR instead of fetch so we can track upload progress
    const xhr = new XMLHttpRequest();
    activeXHR = xhr;
    const uploadPromise = new Promise((resolve, reject) => {
      xhr.upload.onprogress = e => {
        if (e.lengthComputable) {
          const pct = Math.round(e.loaded / e.total * 100);
          updateCardInPlace('analyzing', 'Uploading...', pct, 'Uploading file...');
        }
      };
      xhr.onload = () => {
        if (xhr.status === 200) {
          try { resolve(JSON.parse(xhr.responseText)); }
          catch { reject(new Error('Upload failed')); }
        } else {
          try { reject(new Error(JSON.parse(xhr.responseText).error || 'Upload failed')); }
          catch { reject(new Error('Upload failed')); }
        }
      };
      xhr.onerror = () => reject(new Error('Upload failed. Check your connection and try again.'));
      xhr.onabort = () => reject(new Error('__aborted__'));
    });

    xhr.open('POST', '/api/upload');
    xhr.send(form);
    const data = await uploadPromise;
    activeXHR = null;

    if (data.error) { showError(area, friendlyError(data.error)); return; }

    // Persist the job ID so we can resume if the user refreshes
    currentJob = data.job_id;
    localStorage.setItem('squishit_job', JSON.stringify({
      jobId: data.job_id, fileName: file.name, fileSize: file.size, targetMB
    }));
    pollStatus(data.job_id, file, thumbURL);

  } catch (err) {
    activeXHR = null;
    if (err.message === '__aborted__') return; // Aborted by the user dropping a new file — not an error
    showError(document.getElementById('job-area'), friendlyError(err.message));
  }
}

// Poll the server every 800ms. The server drives the state machine
// (analyzing -> compressing pass 1 -> pass 2 -> done/error), we just reflect it.
function pollStatus(jobId, file, thumbURL) {
  const area = document.getElementById('job-area');
  if (activePoll) clearInterval(activePoll);
  activePoll = setInterval(async () => {
    try {
      const res = await fetch(`/api/status/${jobId}`);
      const d = await res.json();

      if (d.status === 'analyzing') {
        updateCardInPlace('analyzing', 'Analyzing...', 5, 'Reading video metadata...');
      } else if (d.status === 'compressing') {
        const passLabel = d.pass === 1 ? 'Pass 1 — Analyzing motion' : 'Pass 2 — Encoding';
        updateCardInPlace('compressing', 'Compressing...', d.progress, passLabel);
      } else if (d.status === 'done') {
        clearInterval(activePoll); activePoll = null;
        showResult(area, file, thumbURL, d);
      } else if (d.status === 'error') {
        clearInterval(activePoll); activePoll = null;
        showError(area, friendlyError(d.error));
      }
    } catch { /* Network hiccup — the interval will retry on the next tick */ }
  }, 800);
}

function showResult(area, file, thumbURL, d) {
  const inputMB = (d.input_size / 1048576).toFixed(1);
  const outputMB = (d.output_size / 1048576).toFixed(1);
  const reduction = Math.round((1 - d.output_size / d.input_size) * 100);

  const isSmall = d.already_small;
  const note = d.note ? `<p class="result-note">${escHtml(d.note)}</p>` : '';
  const params = d.params;
  const paramsInfo = params ? `${params.width}x${params.height} &bull; ${params.video_bitrate_kbps}kbps video &bull; ${params.audio_bitrate_kbps}kbps audio` : '';

  area.innerHTML = `
    <div class="job-card">
      <div class="job-header">
        <div class="job-thumb">${thumbHtml(thumbURL)}</div>
        <div class="job-info">
          <h4>${escHtml(file.name)}</h4>
          <p class="result-params">${paramsInfo}</p>
        </div>
        <div class="job-status done">${isSmall ? 'Already OK!' : 'Squished!'}</div>
      </div>
      ${isSmall ? '<p style="text-align:center;color:var(--green);font-size:14px;margin:12px 0">Already under the limit — no compression needed!</p>' : `
      <div class="result-stats">
        <div class="stat-box before">
          <div class="label">Before</div>
          <div class="value">${inputMB}<small class="stat-unit">MB</small></div>
        </div>
        <div class="stat-arrow">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round"><polyline points="5 12 12 12 19 12"/><polyline points="15 8 19 12 15 16"/></svg>
          <div class="pct">-${reduction}%</div>
        </div>
        <div class="stat-box after">
          <div class="label">After</div>
          <div class="value">${outputMB}<small class="stat-unit">MB</small></div>
        </div>
      </div>
      `}
      ${note}
      <a class="btn-download" href="/api/download/${currentJob}" download>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Download Squished Video
      </a>
      <button class="btn-another" onclick="reset()">Squish another</button>
    </div>`;
}

function showError(area, msg) {
  localStorage.removeItem('squishit_job');
  area.innerHTML = `
    <div class="job-card">
      <div style="text-align:center;padding:16px 0">
        <div class="job-status error" style="display:inline-block;margin-bottom:12px">Error</div>
        <p style="color:var(--red);font-size:14px;margin-bottom:16px">${escHtml(msg)}</p>
        <button class="btn-another" onclick="reset()">Try a different file</button>
      </div>
    </div>`;
}

function reset() {
  if (activeXHR) { activeXHR.abort(); activeXHR = null; }
  if (activePoll) { clearInterval(activePoll); activePoll = null; }
  localStorage.removeItem('squishit_job');
  document.getElementById('job-area').innerHTML = '';
  currentJob = null;
}

// On page load, check if a job was in progress when the user last left.
// If the job is still running on the server, reconnect to it automatically.
(function restoreSession() {
  const saved = localStorage.getItem('squishit_job');
  if (!saved) return;
  let state;
  try { state = JSON.parse(saved); } catch { localStorage.removeItem('squishit_job'); return; }
  const { jobId, fileName, fileSize } = state;
  fetch(`/api/status/${jobId}`)
    .then(r => r.ok ? r.json() : Promise.reject())
    .then(d => {
      if (!d || d.error || d.status === 'error') { localStorage.removeItem('squishit_job'); return; }
      currentJob = jobId;
      const area = document.getElementById('job-area');
      const fakeFile = { name: fileName, size: fileSize || 0 };
      if (d.status === 'done') {
        showResult(area, fakeFile, null, d);
      } else {
        area.innerHTML = buildJobCard(fakeFile, null, 'analyzing', 'Reconnecting...', d.progress || 0, 'Reconnecting to your job...');
        pollStatus(jobId, fakeFile, null);
      }
    })
    .catch(() => localStorage.removeItem('squishit_job'));
})();
</script>
